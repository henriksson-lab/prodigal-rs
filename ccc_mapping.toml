# Function-level mapping for code-complexity-comparator.
# Generated from:
#   ccc-rs analyze Prodigal -l c --recurse
#   ccc-rs analyze src -l rust --recurse
#
# The C metagenome initializers initialize_metagenome_0 through
# initialize_metagenome_49 are intentionally not mapped here: Rust stores those
# models as binary fixtures loaded by load_metagenome(), so there is no
# one-Rust-function-per-C-function comparator target for them.

