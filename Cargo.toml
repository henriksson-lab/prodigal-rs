[package]
name = "prodigal"
version = "2.6.3"
edition = "2021"
description = "Prokaryotic gene prediction (Rust wrapper around Prodigal C code)"
license = "GPL-3.0"

[lib]
name = "prodigal"
path = "src/lib.rs"

[[bin]]
name = "prodigal-rs"
path = "src/main.rs"

[build-dependencies]
cc = "1"

[dependencies]
clap = { version = "4", features = ["derive"] }

[dev-dependencies]
tempfile = "3"
